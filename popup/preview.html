<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WordPress Browser Extension — preview</title>
  <link rel="stylesheet" href="../dist/preview.css">
  <style>
    /* Override the bundled popup.scss body rules so the preview page can
     * grow to full viewport width and scroll naturally. */
    html, body {
      width: auto;
      min-height: 100%;
      overflow: auto !important;
    }
    body {
      margin: 0;
      padding: 40px;
      background: #e5e9ef;
      font-family: -apple-system, system-ui, sans-serif;
    }
    h1 {
      font-size: 13px;
      font-weight: 500;
      color: #687280;
      margin: 0 0 28px;
      letter-spacing: 0.02em;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(auto-fill, 380px);
      gap: 28px 28px;
      align-items: start;
    }
    .preview-cell { width: 380px; }
    .preview-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #687280;
      margin-bottom: 10px;
    }
    .preview-frame {
      width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>WordPress Browser Extension — popup states</h1>
  <div id="board"></div>
  <script src="../dist/preview.js"></script>
</body>
</html>
